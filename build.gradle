plugins {
    id 'fabric-loom' version '1.3-SNAPSHOT'
}

version = '1.0.0'
group = 'com.esp'

// Termux'taki Java sürümün ne olursa olsun (ister 21 ister 25) 
// Gradle'ın hata vermeden zorla derlemesini sağlıyoruz.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << "-Xlint:-options"
}

dependencies {
    minecraft "com.mojang:minecraft:1.20.1"
    mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
    modImplementation "net.fabricmc:fabric-loader:0.14.22"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.85.0+1.20.1"
}

// Fabric'in modu tanıması için gereken kaynak dosyalarını pakete pürüzsüzce dahil et
processResources {
    inputs.property "version", project.version
    filteringCharset = 'UTF-8'

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
