name: Minecraft Mod Compiler

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kodlari Kopyala
      uses: actions/checkout@v4

    - name: Java 17 Kur
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: src.zip Dosyasini Ac
      run: |
        if [ -f src.zip ]; then
          unzip src.zip
          rm src.zip
        fi

    - name: Gradle 8.3 Sürümünü Hazır İndir ve Kur
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.3'

    - name: Modu Derle
      run: gradle build --no-daemon
